server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  public-url: ${PUBLIC_URL:http://localhost}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    whatsapp-integrated-number: ${MSG91_WHATSAPP_NUMBER:}
    bill-receipt-template: ${MSG91_BILL_RECEIPT_TEMPLATE:bill_receipt}
    promo-template: ${MSG91_PROMO_TEMPLATE:salon_promo}
    promo-sms-flow-id: ${MSG91_PROMO_SMS_FLOW_ID:}
    sms-sender: ${MSG91_SMS_SENDER:}
