server:
  port: 8080

spring:
  application:
    name: salon-platform-api
  datasource:
    url: jdbc:postgresql://localhost:5432/salon_platform
    username: salon
    password: salon_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: ${JWT_SECRET:salon-platform-jwt-secret-change-in-production-min-256-bits-long-key-here}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
